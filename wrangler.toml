# Olla — Cajeta package registry Worker.
#
# Local dev: `npm run dev` (wrangler dev) runs the Worker with Miniflare,
# which emulates D1 + R2 entirely on-disk — no Cloudflare account needed.
# Apply migrations first with `npm run migrate:local`.
#
# The Worker is a pure JSON/bytes API (no static-asset binding) so an
# unknown route returns 404 JSON per the protocol spec (§7). The web UI
# (ui/) is a separate Vite app that proxies to this origin in dev and
# deploys to Cloudflare Pages on the same origin in prod.

name = "cajeta-olla"
main = "src/index.ts"
compatibility_date = "2025-07-18"
workers_dev = true

# Catalog (system of record for metadata). The placeholder database_id is
# fine for `--local`; replace with the real id from `wrangler d1 create
# olla-catalog` before any `--remote` apply / deploy.
[[d1_databases]]
binding = "DB"
database_name = "olla-catalog"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

# Artifact bytes (content-addressed at blob/<sha256>).
[[r2_buckets]]
binding = "BLOBS"
bucket_name = "olla-artifacts"

[vars]
# Capability document (§9). TTL the client caches the probe for.
CAPABILITY_TTL_SECONDS = "3600"
# Comma-separated <name>@<version> bundles advertised under
# capabilities.well-known-bundles.
WELL_KNOWN_BUNDLES = "stdlib@1.0.0"
# Search backend: "d1" (built-in FTS5 trigram) or "algolia" (§12).
SEARCH_PROVIDER = "d1"
# DEV ONLY: allow unsigned publishes + an untrusted key-id (skips Ed25519
# verification). Never set in production — override to "0" there.
ALLOW_UNSIGNED = "1"
# Bundle compression level (§14). 19 = strong cross-member dedup, still
# client-decodable (windowLog ≤ 27). Lower it if Worker CPU is tight.
BUNDLE_ZSTD_LEVEL = "19"
# Require a verified namespace proof on publish (§15). Off for local dev.
REQUIRE_NAMESPACE = "0"

# Transparency-log signing key (§15) is a SECRET — do NOT put it here. Locally
# set LOG_SIGNING_KEY_ID / LOG_SIGNING_KEY_PEM in .dev.vars (gitignored); in
# production use `wrangler secret put LOG_SIGNING_KEY_PEM`.
